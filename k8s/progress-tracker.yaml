apiVersion: v1
kind: Namespace
metadata:
  name: progress-tracker
---
apiVersion: v1
kind: Secret
metadata:
  name: progress-tracker-secrets
  namespace: progress-tracker
type: Opaque
stringData:
  SYNC_TOKEN: change-me
  GITHUB_TOKEN: ""
  POSTGRES_USER: progress_tracker
  POSTGRES_PASSWORD: progress_tracker
  POSTGRES_DB: progress_tracker
  DATABASE_URL: postgresql://progress_tracker:progress_tracker@progress-tracker-postgres.progress-tracker.svc.cluster.local:5432/progress_tracker
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: progress-tracker-postgres-data
  namespace: progress-tracker
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: progress-tracker-postgres
  namespace: progress-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: progress-tracker-postgres
  template:
    metadata:
      labels:
        app: progress-tracker-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: progress-tracker-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: progress-tracker-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: progress-tracker-secrets
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - progress_tracker
                - -d
                - progress_tracker
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - progress_tracker
                - -d
                - progress_tracker
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: progress-tracker-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: progress-tracker-postgres
  namespace: progress-tracker
spec:
  type: ClusterIP
  selector:
    app: progress-tracker-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: progress-tracker-backend
  namespace: progress-tracker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: progress-tracker-backend
  template:
    metadata:
      labels:
        app: progress-tracker-backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h progress-tracker-postgres -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: progress-tracker-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: progress-tracker-secrets
                  key: POSTGRES_DB
      containers:
        - name: backend
          image: progress-tracker-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: SYNC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: progress-tracker-secrets
                  key: SYNC_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: progress-tracker-secrets
                  key: GITHUB_TOKEN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: progress-tracker-secrets
                  key: DATABASE_URL
            - name: CORS_ORIGINS
              value: "*"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: progress-tracker-backend
  namespace: progress-tracker
spec:
  type: ClusterIP
  selector:
    app: progress-tracker-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: progress-tracker-frontend
  namespace: progress-tracker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: progress-tracker-frontend
  template:
    metadata:
      labels:
        app: progress-tracker-frontend
    spec:
      containers:
        - name: frontend
          image: progress-tracker-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: API_BASE_URL
              value: http://progress-tracker-backend.progress-tracker.svc.cluster.local:8000
            - name: NEXT_PUBLIC_API_BASE_URL
              value: ""
---
apiVersion: v1
kind: Service
metadata:
  name: progress-tracker-frontend
  namespace: progress-tracker
spec:
  type: ClusterIP
  selector:
    app: progress-tracker-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: progress-tracker-web
  namespace: progress-tracker
spec:
  type: NodePort
  selector:
    app: progress-tracker-frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 30081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: progress-tracker
  namespace: progress-tracker
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - progress-tracker.192.168.239.141.sslip.io
        - progress-tracker.mah.com
      secretName: progress-tracker-tls
  rules:
    - host: progress-tracker.192.168.239.141.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: progress-tracker-frontend
                port:
                  number: 3000
    - host: progress-tracker.mah.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: progress-tracker-frontend
                port:
                  number: 3000
