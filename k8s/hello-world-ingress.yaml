apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-world
  namespace: hello-world
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - hello.192.168.239.141.sslip.io
      secretName: hello-world-tls
  rules:
    - host: hello.192.168.239.141.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello-world
                port:
                  number: 80
