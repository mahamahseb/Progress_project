name: Branch CI

on:
  push:
    branches-ignore:
      - main

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: progress_tracker
          POSTGRES_PASSWORD: progress_tracker
          POSTGRES_DB: progress_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U progress_tracker -d progress_tracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://progress_tracker:progress_tracker@localhost:5432/progress_tracker_test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  kubernetes-validate:
    name: Validate Kubernetes manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install YAML parser
        run: python -m pip install pyyaml

      - name: Validate manifests
        run: |
          python - <<'PY'
          from pathlib import Path

          import yaml

          path = Path("k8s/progress-tracker.yaml")
          docs = [doc for doc in yaml.safe_load_all(path.read_text()) if doc]
          if not docs:
              raise SystemExit(f"{path} does not contain Kubernetes resources")

          required = ("apiVersion", "kind", "metadata")
          for index, doc in enumerate(docs, start=1):
              missing = [key for key in required if key not in doc]
              if missing:
                  raise SystemExit(
                      f"{path} document {index} is missing: {', '.join(missing)}"
                  )
              metadata = doc.get("metadata") or {}
              if not metadata.get("name"):
                  raise SystemExit(f"{path} document {index} is missing metadata.name")

          print(f"Validated {len(docs)} Kubernetes resources in {path}")
          PY

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
      - kubernetes-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t progress-tracker-backend:branch-ci -f backend/Dockerfile .

      - name: Build frontend image
        run: docker build -t progress-tracker-frontend:branch-ci -f frontend/Dockerfile ./frontend

  deploy-branch:
    name: Deploy branch to Minikube
    runs-on:
      - self-hosted
      - linux
    needs:
      - backend-tests
      - frontend-build
      - kubernetes-validate
      - docker-build
    concurrency:
      group: branch-progress-tracker-minikube
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required tools
        run: |
          docker --version
          minikube version
          kubectl version --client
          python3 --version

      - name: Install YAML parser
        run: python3 -m pip install --user pyyaml

      - name: Deploy branch namespace
        env:
          NAMESPACE: branch-progress-tracker
          USE_REMOTE_IMAGES: "0"
          INGRESS_HOST: branch-progress-tracker.192.168.239.141.sslip.io
          INGRESS_ALT_HOST: branch-progress-tracker.mah.com
          MANAGE_DIRECT_PORT_FORWARD: "0"
          MANAGE_HTTPS_FORWARDER: "0"
        run: bash scripts/deploy-minikube.sh

      - name: Show branch access URL
        run: |
          echo "Branch namespace deployed: branch-progress-tracker"
          echo "Open:"
          echo "https://branch-progress-tracker.192.168.239.141.sslip.io/"
          echo "https://branch-progress-tracker.mah.com/"
