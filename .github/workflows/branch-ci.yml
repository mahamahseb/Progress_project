name: Branch CI

on:
  push:
    branches-ignore:
      - main

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  kubernetes-validate:
    name: Validate Kubernetes manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install YAML parser
        run: python -m pip install pyyaml

      - name: Validate manifests
        run: |
          python - <<'PY'
          from pathlib import Path

          import yaml

          path = Path("k8s/progress-tracker.yaml")
          docs = [doc for doc in yaml.safe_load_all(path.read_text()) if doc]
          if not docs:
              raise SystemExit(f"{path} does not contain Kubernetes resources")

          required = ("apiVersion", "kind", "metadata")
          for index, doc in enumerate(docs, start=1):
              missing = [key for key in required if key not in doc]
              if missing:
                  raise SystemExit(
                      f"{path} document {index} is missing: {', '.join(missing)}"
                  )
              metadata = doc.get("metadata") or {}
              if not metadata.get("name"):
                  raise SystemExit(f"{path} document {index} is missing metadata.name")

          print(f"Validated {len(docs)} Kubernetes resources in {path}")
          PY

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
      - kubernetes-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t progress-tracker-backend:branch-ci -f backend/Dockerfile .

      - name: Build frontend image
        run: docker build -t progress-tracker-frontend:branch-ci -f frontend/Dockerfile ./frontend
