name: Cleanup Minikube Server

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cleanup-minikube-server.yml"
      - "scripts/cleanup-minikube-server.sh"

jobs:
  cleanup:
    name: Clean old local artifacts
    runs-on:
      - self-hosted
      - linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup server artifacts
        run: bash scripts/cleanup-minikube-server.sh
