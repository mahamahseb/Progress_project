name: Deploy to Minikube

on:
  workflow_dispatch:
    inputs:
      port_forward_port:
        description: "Port to expose ingress-nginx on the Minikube server"
        required: false
        default: "8081"
      image_tag:
        description: "Docker image tag to deploy from DockerHub"
        required: false
        default: "latest"
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  deploy:
    name: Deploy Progress Tracker
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on:
      - self-hosted
      - linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required tools
        run: |
          docker --version
          minikube version
          kubectl version --client

      - name: Deploy to Minikube
        env:
          PORT_FORWARD_PORT: ${{ inputs.port_forward_port || '8081' }}
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ inputs.image_tag || github.event.workflow_run.head_sha || github.sha }}
          USE_REMOTE_IMAGES: ${{ secrets.DOCKERHUB_USERNAME != '' && '1' || '0' }}
          MANAGE_DIRECT_PORT_FORWARD: "0"
          MANAGE_HTTPS_FORWARDER: "0"
        run: bash scripts/deploy-minikube.sh

      - name: Show access URL
        env:
          PORT_FORWARD_PORT: ${{ inputs.port_forward_port || '8081' }}
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ inputs.image_tag || github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo "Deployed DockerHub images:"
          echo "${DOCKERHUB_NAMESPACE}/progress-tracker-backend:${IMAGE_TAG}"
          echo "${DOCKERHUB_NAMESPACE}/progress-tracker-frontend:${IMAGE_TAG}"
          echo "Open:"
          echo "https://progress-tracker.192.168.239.141.sslip.io/"
          echo "https://progress-tracker.mah.com/"
          echo "Direct fallback:"
          echo "http://192.168.239.141:${PORT_FORWARD_PORT}/"
