name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: progress_tracker
          POSTGRES_PASSWORD: progress_tracker
          POSTGRES_DB: progress_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U progress_tracker -d progress_tracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://progress_tracker:progress_tracker@localhost:5432/progress_tracker_test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  kubernetes-validate:
    name: Validate Kubernetes manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Install YAML parser
        run: python -m pip install pyyaml

      - name: Validate manifests
        run: |
          python - <<'PY'
          from pathlib import Path

          import yaml

          path = Path("k8s/progress-tracker.yaml")
          docs = [doc for doc in yaml.safe_load_all(path.read_text()) if doc]
          if not docs:
              raise SystemExit(f"{path} does not contain Kubernetes resources")

          required = ("apiVersion", "kind", "metadata")
          for index, doc in enumerate(docs, start=1):
              missing = [key for key in required if key not in doc]
              if missing:
                  raise SystemExit(
                      f"{path} document {index} is missing: {', '.join(missing)}"
                  )
              metadata = doc.get("metadata") or {}
              if not metadata.get("name"):
                  raise SystemExit(f"{path} document {index} is missing metadata.name")

          print(f"Validated {len(docs)} Kubernetes resources in {path}")
          PY

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
      - kubernetes-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t progress-tracker-backend:ci -f backend/Dockerfile .

      - name: Build frontend image
        run: docker build -t progress-tracker-frontend:ci -f frontend/Dockerfile ./frontend

  dockerhub-publish:
    name: Publish images to DockerHub
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend-tests
      - frontend-build
      - kubernetes-validate
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Check DockerHub secrets
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "DockerHub publish skipped because DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not configured."
            echo "Add both secrets in GitHub: Settings -> Secrets and variables -> Actions."
          else
            echo "DockerHub secrets are configured; images will be published."
          fi

      - name: Checkout
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: actions/checkout@v4

      - name: Login to DockerHub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        run: |
          docker build \
            -t "${DOCKERHUB_USERNAME}/progress-tracker-backend:latest" \
            -t "${DOCKERHUB_USERNAME}/progress-tracker-backend:${GITHUB_SHA}" \
            -f backend/Dockerfile .
          docker push "${DOCKERHUB_USERNAME}/progress-tracker-backend:latest"
          docker push "${DOCKERHUB_USERNAME}/progress-tracker-backend:${GITHUB_SHA}"

      - name: Build and push frontend image
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        run: |
          docker build \
            -t "${DOCKERHUB_USERNAME}/progress-tracker-frontend:latest" \
            -t "${DOCKERHUB_USERNAME}/progress-tracker-frontend:${GITHUB_SHA}" \
            -f frontend/Dockerfile ./frontend
          docker push "${DOCKERHUB_USERNAME}/progress-tracker-frontend:latest"
          docker push "${DOCKERHUB_USERNAME}/progress-tracker-frontend:${GITHUB_SHA}"
